version: '3.8'

services:
  # 🐘 1. Backend (Laravel + PHP) - Unifica HTTP y WebSockets (Reverb)
  backend:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_server
    ports:
      - "8000:8000" # Servidor HTTP (Laravel)
      - "9090:9090" # WebSockets (Reverb)
    volumes:
      - ./backLobotron:/var/www/html
    depends_on:
      - mariadb
  
    env_file:
      - ./backLobotron/.env

    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
    command: >
      sh -c "
        composer install --no-interaction --prefer-dist &&
        php artisan key:generate &&
        php artisan migrate --force &&
      
        php artisan reverb:start &
    
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # 🧪 2. Backend ONLY for tests (NO toca tu BBDD normal)
  backend_test:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_test
    depends_on:
      - mariadb_test
    volumes:
      - ./backLobotron:/var/www/html
    environment:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: mariadb_test
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_test_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
    command: >
      sh -c "
        composer install &&
        php artisan test
      "

  # 🛢️ 3. Base de datos MariaDB principal
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 🧪 4. Base de datos MariaDB para tests
  mariadb_test:
    image: mariadb:11
    container_name: mariadb_test
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_test_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3308:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql

  # ⚡ 5. Frontend (Node + Vite)
  frontend:
    build:
      context: ./frontLobotron
      dockerfile: Dockerfile
    container_name: front_lobotron_client
    working_dir: /app
    volumes:
      - ./frontLobotron:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
   
    env_file:
      - ./frontLobotron/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "npm install && npm run dev -- --host"

  # 🛠️ 6. Adminer (Interfaz gráfica para gestionar MariaDB)
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
    environment:
      ADMINER_DEFAULT_SERVER: mariadb

volumes:
  mariadb_data:
  mariadb_test_data: