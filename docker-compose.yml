version: '3.8'

services:
  
  # 🐘 Backend (Laravel + PHP)
  backend:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_server
    ports:
      - "8000:8000"
      - "9090:9090"
    volumes:
      - ./backLobotron:/var/www/html
    depends_on:
      - mariadb
    env_file:
      - ./backLobotron/.env 
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
      
      # Las variables de Reverb se leen desde env_file
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 9090
      
    command: >
      sh -c "
        # 1. Instalación y Migración (asumiendo que se hace una vez)
        composer install --no-interaction --prefer-dist &&
        php artisan key:generate &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000 &
        php artisan reverb:start 
      "

  # 🧪 Backend ONLY for tests
  backend_test:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_test
    volumes:
      - ./backLobotron:/var/www/html
    depends_on:
      - mariadb_test
    env_file:
      - ./backLobotron/.env
    environment:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: mariadb_test
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_test_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
    command: >
      sh -c "
        composer install &&
        php artisan test
      "

  # 🛢️ Base de datos MariaDB principal
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 🧪 Base de datos MariaDB para tests
  mariadb_test:
    image: mariadb:11
    container_name: mariadb_test
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_test_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3308:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql

  # ⚡ Frontend (Node + Vite)
  frontend:
    build:
      context: ./frontLobotron
      dockerfile: Dockerfile
    container_name: front_lobotron_client
    working_dir: /app
    volumes:
      - ./frontLobotron:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - ./backLobotron/.env 
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "npm install && npm run dev -- --host"

  # 🛠️ Adminer (Interfaz gráfica para gestionar MariaDB)
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  mariadb_data:
  mariadb_test_data: