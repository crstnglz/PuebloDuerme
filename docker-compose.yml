version: '3.8'

services:
  # 🐘 1. Backend (Laravel + PHP) - Servidor HTTP
  backend:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_server
    # Solo mapeamos el puerto 8000 (HTTP)
    ports:
      - "8000:8000"
    volumes:
      - ./backLobotron:/var/www/html
    depends_on:
      - mariadb
    environment:
      # Las variables de DB_HOST y otros usan los nombres de servicio internos
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
    command: >
      sh -c "
        composer install --no-interaction --prefer-dist &&
        php artisan key:generate &&
        php artisan migrate --force &&
        # Solo inicia el servidor web y lo mantiene vivo
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # 🚀 2. Reverb (WebSocket) - Servicio Dedicado
  reverb:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_reverb
    # Mapeamos el puerto 9090 para que el frontend (navegador) pueda conectarse
    ports:
      - "9090:9090"
    volumes:
      - ./backLobotron:/var/www/html
    # Depende de la base de datos si Reverb necesita autenticar usuarios
    depends_on:
      - mariadb
    # Reverb necesita las claves de la aplicación
    env_file:
      - ./backLobotron/.env
    # El comando que corre SOLO Reverb y lo mantiene vivo
    command: php artisan reverb:start

  # 🧪 3. Backend ONLY for tests
  backend_test:
    build:
      context: ./backLobotron
      dockerfile: Dockerfile
    container_name: back_lobotron_test
    depends_on:
      - mariadb_test
    volumes:
      - ./backLobotron:/var/www/html
    environment:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: mariadb_test
      DB_PORT: "3306"
      DB_DATABASE: el_lobotron_test_db
      DB_USERNAME: ellobotron
      DB_PASSWORD: elcubatron
    command: >
      sh -c "
        composer install &&
        php artisan test
      "

  # 🛢️ 4. Base de datos MariaDB principal
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 🧪 5. Base de datos MariaDB para tests
  mariadb_test:
    image: mariadb:11
    container_name: mariadb_test
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: el_lobotron_test_db
      MARIADB_USER: ellobotron
      MARIADB_PASSWORD: elcubatron
    ports:
      - "3308:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql

  # ⚡ 6. Frontend (Node + Vite)
  frontend:
    build:
      context: ./frontLobotron
      dockerfile: Dockerfile
    container_name: front_lobotron_client
    working_dir: /app
    volumes:
      - ./frontLobotron:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - reverb # Aseguramos que Reverb esté listo
    # El frontend necesita acceder a las variables VITE_ del .env
    env_file:
      - ./frontLobotron/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "npm install && npm run dev -- --host"

volumes:
  mariadb_data:
  mariadb_test_data: