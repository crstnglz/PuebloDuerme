name: Full Docker Stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-full-stack:
    runs-on: ubuntu-latest

    steps:
      # Descargar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Construir TODOS los servicios definidos en docker-compose.yml
      - name: Build all services
        run: |
          docker compose -f docker-compose.yml build

      # Levantar stack completo en background
      - name: Start full stack
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Wait for backend (http://localhost:8000)
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000 >/dev/null; then
              echo "Backend is responding"
              exit 0
            fi
            echo "Waiting for backend... ($attempt/30)"
            sleep 2
          done
          docker compose -f docker-compose.yml logs backend
          exit 1

      - name: Wait for frontend (http://localhost:5173)
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:5173 >/dev/null; then
              echo "Frontend is responding"
              exit 0
            fi
            echo "Waiting for frontend... ($attempt/30)"
            sleep 2
          done
          docker compose -f docker-compose.yml logs frontend
          exit 1

      - name: Show running containers
        run: docker compose -f docker-compose.yml ps

      # Logs opcionales (útil si pasa algo raro)
      - name: Show docker logs
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color

      # Apagar stack completo al terminar
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down || true
