upstream back_lobotron_server {
    server back_lobotron_server:8000;
}

upstream front_lobotron_client {
    server front_lobotron_client:5173;
}

upstream back_lobotron_server_ws {
    server back_lobotron_server:9090;
}


server {
    listen 80;
    server_name _;

    # FRONTEND Vite
    location / {
        proxy_pass http://front_lobotron_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Laravel
    location /api/ {
        proxy_pass http://back_lobotron_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WEBSOCKETS
    location /ws/ {
        proxy_pass http://back_lobotron_server_ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}