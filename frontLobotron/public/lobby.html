<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobotron – Lobby</title>
    <link rel="icon" href="/imagesUI/logo.jpeg" />
    <link rel="stylesheet" href="/src/styles/lobby.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="name">LOBOTRON</h1>

      <div class="profile">
        <img
          class="profile-img"
          src="/imagesUI/profile.png"
          alt="Perfil del jugador"
        />

        <ul class="profile-menu">
          <li><a href="/indexUI.html" class="btn-profile">Volver al menú</a></li>
          <li><a href="#" id="logoutLink">Cerrar sesión</a></li>
        </ul>
      </div>
    </header>

    <main class="lobby">
      <!-- COLUMNA IZQUIERDA: USUARIO + BOTONES -->
      <section class="lobby-sidebar">
        <div class="player-card">
          <div class="player-avatar-wrapper">
            <img
              id="lobbyProfileImg"
              class="player-avatar"
              src="/imagesUI/predprofile.png"
              alt="Avatar del jugador"
            />
          </div>

          <p id="lobbyNickname" class="player-nickname">Nombre de jugador</p>
        </div>

        <div class="lobby-actions">
          <button id="joinGameBtn" class="lobby-btn" type="button">
            Unirse a partida
          </button>

          <button id="createGameBtn" class="lobby-btn" type="button">
            Crear partida
          </button>
        </div>
      </section>

      <!-- COLUMNA DERECHA: TABLA DE PARTIDAS -->
      <section class="lobby-main">
        <h2 class="lobby-title">Partidas disponibles</h2>

        <div class="table-wrapper">
          <table class="lobby-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Jugadores</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="gamesTableBody">
              <tr class="empty-row">
                <td colspan="4">Todavía no hay partidas creadas.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/src/pages/lobby.ts"></script>
  </body>
</html>
