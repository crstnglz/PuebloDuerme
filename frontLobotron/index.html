<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobotron</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="icon" href="images/logo.jpeg" />
  </head>
  <body>
    <header class="header">
      <h1 class="name">LOBOTRON</h1>

      <div class="profile">
        <img
          class="profile-img"
          src="images/profile.png"
          alt="Perfil del jugador"
        />

        <ul class="profile-menu">
          <li><a href="#">Ver mi perfil</a></li>
          <li><a href="#">Cerrar sesion</a></li>
        </ul>
      </div>
    </header>

    <main class="stage">
      <div class="wolf"></div>
      <div class="girl"></div>

      <button class="play" type="button">JUGAR</button>
      <button class="rol" type="button">ROL</button>

      <button id="open-guide" class="guide" type="button">GUIA</button>
      <div id="guide-modal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>

          <div class="book">
            <div class="page active">
              <h2>Introducción</h2>
              <p>Los hombres lobos de Castronegro es un juego de deducción...</p>
            </div>

            <div class="page">
              <h2>Consejos</h2>
              <p>Texto de la segunda página...</p>
            </div>
          </div>

          <div class="controls">
            <button id="prev" class="page-btn"><</button>
            <button id="next" class="page-btn">></button>
          </div>
        </div>
      </div>
    </main>

    <audio autoplay loop>
      <source src="images/music.mp3" />
      Tu navegador no soporta el audio.
    </audio>
    <script src="src/main.ts"></script>
  </body>
</html>
