<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso - Lobos de Castronegro</title>

    <link rel="icon" type="image/png" href="/images/logo.jpg" />
    <link rel="stylesheet" href="src/styles/index.css">
  </head>

  <body>
  <div class="wrapper">
    <div class="forest-eyes"></div>

    <input type="checkbox" id="flip-toggle" hidden>

    <div class="flip-wrapper">
      <div class="flip-card__front" id="login">
        <div class="title">Iniciar Sesión</div>
        <form id="login-form" class="flip-card__form" action="">
          <input id="login-identifier" class="flip-card__input" name="identifier" placeholder="Email o Usuario"
            type="text" required>
          <div class="password-wrapper">
            <input id="login-password" class="flip-card__input" name="password" placeholder="Contraseña" type="password"
              required>
            <span class="toggle-password" data-target="login-password"></span>
          </div>
          <div id="login-general-message" class="message-box"></div>
          <button class="flip-card__btn" type="submit">¡Aullar!</button>

          <!-- <div class="forgot-link">
            <label id="forgot-password-btn" style="cursor:pointer">¿Has olvidado la contraseña?</label>
          </div> -->
        </form>

        <div class="switch-link">
          ¿No tienes cuenta? <label for="flip-toggle" style="cursor:pointer">Registrarse</label>
        </div>
      </div>

      
      <div class="flip-card__back">
        <h1 class="title">Registrarse</h1>
        <form id="register-form" class="flip-card__form" action="">
          <input id="nickname" class="flip-card__input" placeholder="Nombre de usuario" type="text" required minlength="3"
            maxlength="20" pattern="^\S+$">
          <input id="email" class="flip-card__input" name="email" placeholder="Email" type="email" required>
          <div class="password-wrapper">
            <input id="password" class="flip-card__input" name="password" placeholder="Contraseña" type="password"
              required>
            <span class="toggle-password" data-target="password"></span>
          </div>
          <div class="password-wrapper">
            <input id="passwordConfirm" class="flip-card__input" name="password_confirm" placeholder="Confirmar contraseña"
              type="password" required>
            <span class="toggle-password" data-target="passwordConfirm"></span>
          </div>
          <div id="general-message" class="message-box"></div>
          <button class="flip-card__btn" type="submit">¡Unirse!</button>
        </form>

        <div class="switch-link">
          ¿Ya tienes cuenta? <label for="flip-toggle" style="cursor:pointer">Acceder</label>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
  <script src="./src/pages/login.ts"></script>
</body>

</html>
